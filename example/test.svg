@startuml
participant test
database testando
database sla123

group first
    test-> testando++: 1
    return 1a
    test-> sla123++: 2
    return 1b
    test-> sla123++: 3
    return 1c
    testando-> sla123++: 4
    return 1d
    testando-> sla123++: 5
    return 1e
    test-> testando++: 6
    return 1f
    test-> testando++: 9
    return 1g
end
@enduml

